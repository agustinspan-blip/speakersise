<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Vinyl record">
  <!-- Vinyl record: black disk with subtle concentric grooves and a red center label.
       Sized in a 100×100 viewBox so it scales cleanly to any pixel size. -->
  <defs>
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <!-- Main disk -->
  <circle cx="50" cy="50" r="48" fill="url(#disk)"/>
  <!-- Concentric grooves -->
  <g fill="none" stroke="#2a2a2a" stroke-width="0.4">
    <circle cx="50" cy="50" r="44"/>
    <circle cx="50" cy="50" r="40"/>
    <circle cx="50" cy="50" r="36"/>
    <circle cx="50" cy="50" r="32"/>
    <circle cx="50" cy="50" r="28"/>
    <circle cx="50" cy="50" r="24"/>
    <circle cx="50" cy="50" r="20"/>
  </g>
  <!-- Highlight reflection arc -->
  <path d="M 18 32 A 36 36 0 0 1 50 14" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.2"/>
  <!-- Red center label -->
  <circle cx="50" cy="50" r="14" fill="#c1272d"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="#7a1a1f" stroke-width="0.6"/>
  <!-- Spindle hole -->
  <circle cx="50" cy="50" r="1.6" fill="#000000"/>
</svg>
