<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" role="img" aria-label="TrueScale mark">
  <!--
    8-point sunburst, hand-crafted to match the original brand lockup.
    The shape is mirror-symmetric across both axes (the previous
    auto-vectorised version inherited a clipped right arm because the
    source PNG was cropped too tightly before the trace).

    Geometry (viewBox 100×140, centre at 50,70):
      - N / S tips: long vertical points at y=0 and y=140
      - E / W tips: medium horizontal points at x=0 and x=100
      - NE / NW / SE / SW: short diagonal points
      - Inner valleys tight to the centre so the spikes read as sharp
        rays rather than a chunky compass rose.
  -->
  <path
    fill="#d97706"
    d="M 50 0
       L 54 64
       L 72 50
       L 58 66
       L 100 70
       L 58 74
       L 72 90
       L 54 76
       L 50 140
       L 46 76
       L 28 90
       L 42 74
       L 0 70
       L 42 66
       L 28 50
       L 46 64
       Z"
  />
</svg>
