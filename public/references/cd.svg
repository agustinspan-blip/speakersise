<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Audio CD (120 mm)">
  <defs>
    <radialGradient id="cdSheen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2f2f2"/>
      <stop offset="35%" stop-color="#d9d9d9"/>
      <stop offset="60%" stop-color="#bdbdbd"/>
      <stop offset="85%" stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#9a9a9a"/>
    </radialGradient>
    <linearGradient id="cdRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(120,180,255,0.35)"/>
      <stop offset="25%" stop-color="rgba(180,255,200,0.30)"/>
      <stop offset="50%" stop-color="rgba(255,235,160,0.30)"/>
      <stop offset="75%" stop-color="rgba(255,170,170,0.30)"/>
      <stop offset="100%" stop-color="rgba(200,170,255,0.30)"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="59.5" fill="url(#cdSheen)" stroke="#7a7a7a" stroke-width="0.5"/>
  <circle cx="60" cy="60" r="59.5" fill="url(#cdRainbow)"/>
  <!-- inner clamping ring (mirror band) -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#a8a8a8" stroke-width="0.4"/>
  <circle cx="60" cy="60" r="17" fill="#ededed" stroke="#bdbdbd" stroke-width="0.3"/>
  <!-- center spindle hole -->
  <circle cx="60" cy="60" r="7.5" fill="#fafafa" stroke="#9a9a9a" stroke-width="0.4"/>
</svg>
