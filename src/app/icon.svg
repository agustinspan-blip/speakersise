<?xml version="1.0" encoding="UTF-8"?>
<!--
  TrueScale favicon — same 8-point sunburst as the site's brand mark,
  reshaped into a 100×100 square so it renders cleanly at favicon
  sizes (16, 32, 48). The amber fill (#d97706) reads well over both
  light and dark tab backgrounds without needing a media-query
  adaptation, so the icon stays a single solid path.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <path
    fill="#d97706"
    d="M 50 0
       L 54 46
       L 72 36
       L 58 47
       L 100 50
       L 58 53
       L 72 64
       L 54 54
       L 50 100
       L 46 54
       L 28 64
       L 42 53
       L 0 50
       L 42 47
       L 28 36
       L 46 46
       Z"
  />
</svg>
